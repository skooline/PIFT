
<h2 class="sr-only">PIFT geodesic vs KT value function using exact geometric inversion without smooth regularization, with live parameter controls.</h2>

<div style="padding:1rem 0 0;">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.2rem;">
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem 1rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;">KT λ</div>
    <div style="font-size:22px;font-weight:500;" id="kt-lam">2.25</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem 1rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;">KT α</div>
    <div style="font-size:22px;font-weight:500;" id="kt-alp">0.88</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem 1rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;">geometric ratio g⁻/g⁺</div>
    <div style="font-size:22px;font-weight:500;" id="geom-ratio">5.06</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem 1rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;">RMSE</div>
    <div style="font-size:22px;font-weight:500;" id="rmse-val">—</div>
  </div>
</div>

<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.9rem 1rem;margin-bottom:10px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center;">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <label style="font-size:12px;color:var(--color-text-secondary);width:60px;">λ</label>
        <input type="range" min="1.0" max="4.0" step="0.05" value="2.25" id="lam-s" style="flex:1;">
        <span style="font-size:12px;font-weight:500;min-width:30px;" id="lam-v">2.25</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:12px;color:var(--color-text-secondary);width:60px;">α</label>
        <input type="range" min="0.5" max="1.0" step="0.01" value="0.88" id="alp-s" style="flex:1;">
        <span style="font-size:12px;font-weight:500;min-width:30px;" id="alp-v">0.88</span>
      </div>
    </div>
    <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.8;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);" id="formula-box"></div>
  </div>
</div>

<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.9rem 1rem;margin-bottom:10px;">
  <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:11px;color:var(--color-text-secondary);" id="leg"></div>
  <div style="position:relative;height:300px;">
    <canvas id="mc" role="img" aria-label="PIFT geodesic overlaid on KT value function using exact geometric inversion"></canvas>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.9rem 1rem;">
    <div style="font-size:12px;font-weight:500;margin-bottom:6px;">Metric g₁₁(Δ) — required shape</div>
    <div style="position:relative;height:180px;">
      <canvas id="mc2" role="img" aria-label="Required metric g11 as function of Delta"></canvas>
    </div>
  </div>
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.9rem 1rem;">
    <div style="font-size:12px;font-weight:500;margin-bottom:6px;">Singularity at Δ=0 (no regularization)</div>
    <div style="position:relative;height:180px;">
      <canvas id="mc3" role="img" aria-label="Metric near Delta=0 showing singularity without regularization"></canvas>
    </div>
  </div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const N = 600;
let charts = {};

function linspace(a,b,n){
  const r=[];
  for(let i=0;i<n;i++) r.push(a+(b-a)*i/(n-1));
  return r;
}

function ktValue(x, a, lam){
  if(x>=0) return Math.pow(Math.max(x,1e-12),a);
  return -lam*Math.pow(-x,a);
}

function dKT(x, a, lam){
  if(x>0)  return a*Math.pow(x, a-1);
  if(x<0)  return lam*a*Math.pow(-x, a-1);
  return 0;
}

function g11exact(x, a, lam){
  const dv = dKT(x, a, lam);
  return dv*dv;
}

function cumulTrapz(xs, fs){
  const out=new Array(xs.length).fill(0);
  for(let i=1;i<xs.length;i++)
    out[i]=out[i-1]+0.5*(fs[i-1]+fs[i])*(xs[i]-xs[i-1]);
  return out;
}

function rmse(a,b){
  let s=0;
  for(let i=0;i<a.length;i++) s+=(a[i]-b[i])**2;
  return Math.sqrt(s/a.length);
}

function makeChart(id, labels, datasets, yTitle, yMin){
  if(charts[id]){charts[id].destroy();}
  charts[id]=new Chart(document.getElementById(id),{
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:false, animation:{duration:120},
      plugins:{legend:{display:false}, tooltip:{mode:'index',intersect:false,
        callbacks:{label:ctx=>{
          const v=ctx.parsed.y;
          return isFinite(v)? ` ${ctx.dataset.label}: ${v.toFixed(4)}` : ' —';
        }}}},
      scales:{
        x:{ticks:{autoSkip:true,maxTicksLimit:9,font:{size:10}},
           grid:{color:'rgba(128,128,128,0.1)'},
           title:{display:true,text:'Δ',font:{size:10}}},
        y:{min:yMin, ticks:{font:{size:10}},
           grid:{color:'rgba(128,128,128,0.1)'},
           title:{display:yTitle?true:false,text:yTitle,font:{size:10}}}
      }
    }
  });
}

function render(){
  const a   = parseFloat(document.getElementById('alp-s').value);
  const lam = parseFloat(document.getElementById('lam-s').value);

  document.getElementById('kt-lam').textContent = lam.toFixed(2);
  document.getElementById('kt-alp').textContent = a.toFixed(2);
  document.getElementById('geom-ratio').textContent = (lam*lam).toFixed(4);

  document.getElementById('formula-box').innerHTML =
    `g₁₁(Δ) = [dV/dΔ]²<br>` +
    `Δ > 0: g₁₁ = α²·Δ^(2α−2) = ${a.toFixed(2)}²·Δ^${(2*(a-1)).toFixed(3)}<br>` +
    `Δ < 0: g₁₁ = λ²α²·|Δ|^(2α−2) = ${(lam*a).toFixed(3)}²·|Δ|^${(2*(a-1)).toFixed(3)}<br>` +
    `Ratio loss/gain = λ² = ${(lam*lam).toFixed(4)}<br>` +
    `(singularity at Δ=0 when α < 1)`;

  const DA_full = linspace(-3, 3, N);
  const DA_pos  = linspace(1e-4, 3, N/2);
  const DA_neg  = linspace(-3, -1e-4, N/2);
  const DA_main = [...DA_neg, ...DA_pos];

  const ktArr  = DA_main.map(d=>ktValue(d,a,lam));
  const sqrtG  = DA_main.map(d=>Math.sqrt(g11exact(d,a,lam)));
  const L_raw  = cumulTrapz(DA_main, sqrtG);

  const iMid   = DA_neg.length;
  const L_off  = L_raw[iMid];
  const L_sign = DA_main.map((d,i)=> d<0 ? -(L_off-L_raw[i]) : (L_raw[i]-L_off));

  const scalePos = Math.max(...ktArr.filter(v=>v>=0)) / (Math.max(...L_sign.filter(v=>v>=0))||1);
  const L_norm   = L_sign.map(v=>v*scalePos);

  const r = rmse(ktArr, L_norm);
  document.getElementById('rmse-val').textContent = r.toExponential(2);

  const labels_main = DA_main.map(d=>d.toFixed(2));

  document.getElementById('leg').innerHTML = [
    {c:'#185FA5',dash:false,label:`KT V(Δ)  λ=${lam.toFixed(2)}, α=${a.toFixed(2)}`},
    {c:'#D85A30',dash:true, label:`PIFT L(Δ) via exact g₁₁=[dV/dΔ]²  (no regularization)`}
  ].map(l=>`<span style="display:flex;align-items:center;gap:5px;">
    <span style="width:22px;height:3px;background:${l.dash?'none':l.c};${l.dash?`border-top:2px dashed ${l.c}`:''};display:inline-block;"></span>
    ${l.label}</span>`).join('');

  makeChart('mc', labels_main, [
    {label:'KT',   data:ktArr,  borderColor:'#185FA5',borderWidth:2.5,pointRadius:0,tension:0.2,borderDash:[]},
    {label:'PIFT', data:L_norm, borderColor:'#D85A30',borderWidth:2,  pointRadius:0,tension:0.2,borderDash:[7,3]}
  ], 'value', undefined);

  const DA_g = linspace(-2.5, 2.5, 400).filter(d=>Math.abs(d)>0.05);
  const G11  = DA_g.map(d=>g11exact(d,a,lam));
  const labG = DA_g.map(d=>d.toFixed(2));

  makeChart('mc2', labG, [
    {label:'g₊',  data:DA_g.map((d,i)=>d>=0?G11[i]:null), borderColor:'#1D9E75',borderWidth:2,pointRadius:0,tension:0.1},
    {label:'g₋',  data:DA_g.map((d,i)=>d<0 ?G11[i]:null), borderColor:'#D85A30',borderWidth:2,pointRadius:0,tension:0.1}
  ], 'g₁₁(Δ)', 0);

  const DA_near = linspace(-0.5, 0.5, 300).filter(d=>Math.abs(d)>1e-4);
  const G_near  = DA_near.map(d=>Math.min(g11exact(d,a,lam), 50));
  makeChart('mc3', DA_near.map(d=>d.toFixed(3)), [
    {label:'g₁₁', data:G_near, borderColor:'#7F77DD',borderWidth:2,pointRadius:0,tension:0.1}
  ], 'g₁₁ (clipped at 50)', 0);
}

['lam-s','alp-s'].forEach(id=>{
  document.getElementById(id).addEventListener('input', function(){
    document.getElementById(id.replace('-s','-v')).textContent = parseFloat(this.value).toFixed(2);
    render();
  });
});

render();
</script>
